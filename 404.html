<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | PetriGastro</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-crema: #F5F0E8;
            --color-terracota: #C4785A;
            --color-carbon: #2D2A26;
            --color-text-muted: #6B665D;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --color-crema: #F5F0E8;
                --color-terracota: #C4785A;
                --color-carbon: #1A1815;
                --color-text-muted: #A89F94;
            }
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--color-crema);
            color: var(--color-carbon);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            text-decoration: none;
            color: inherit;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
        }
        
        .logo-icon svg {
            width: 100%;
            height: 100%;
        }
        
        .logo-text {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .error-code {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 8rem;
            font-weight: 700;
            color: var(--color-terracota);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.9;
        }
        
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        p {
            color: var(--color-text-muted);
            max-width: 400px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: var(--color-terracota);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(196, 120, 90, 0.3);
        }
        
        .illustration {
            width: 200px;
            height: 200px;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <a href="index.html" class="logo" aria-label="Volver al inicio">
        <span class="logo-icon">
            <svg viewBox="0 0 100 100" fill="none">
                <circle cx="50" cy="50" r="45" fill="#C4785A"/>
                <path d="M30 50 Q50 30 70 50 Q50 70 30 50" fill="#F5F0E8"/>
            </svg>
        </span>
        <span class="logo-text">PetriGastro</span>
    </a>
    
    <svg class="illustration" viewBox="0 0 200 200" fill="none">
        <circle cx="100" cy="100" r="80" fill="rgba(196,120,90,0.1)"/>
        <path d="M60 90 Q100 50 140 90 Q100 130 60 90" fill="rgba(196,120,90,0.2)" stroke="#C4785A" stroke-width="2"/>
        <circle cx="70" cy="75" r="5" fill="#C4785A" opacity="0.5"/>
        <circle cx="130" cy="75" r="5" fill="#C4785A" opacity="0.5"/>
    </svg>
    
    <div class="error-code">404</div>
    
    <h1>Ups! Esta página se perdió</h1>
    
    <p>La página que buscas no existe o ha sido movida. Quizás nuestro menú te puede tentar...</p>
    
    <a href="index.html" class="btn-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Volver al inicio
    </a>
</body>
</html>
