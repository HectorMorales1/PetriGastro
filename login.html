<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Restricted - PetriGastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <svg viewBox="0 0 100 100" fill="none">
                <circle cx="50" cy="50" r="45" fill="#F5F0E8"/>
                <path d="M30 50 Q50 30 70 50 Q50 70 30 50" fill="#C4785A"/>
            </svg>
            <h1>PetriGastro</h1>
            <p>Acceso restringido</p>
        </div>
        
        <div class="login-body">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Ingresa tu usuario">
                    <p class="error-message" id="userError">Usuario requerido</p>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Ingresa tu contraseña">
                    <p class="error-message" id="passError">Contraseña requerida</p>
                </div>
                
                <button type="submit" class="btn-login" id="submitBtn">
                    <span>Acceder</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
